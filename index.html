<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sya Ai - Asisten Cerdas</title>
    
    <!-- ========================================== -->
    <!--                   CSS & LIBRARIES          -->
    <!-- ========================================== -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Konfigurasi Tailwind Kustom & Variabel */
        :root {
            --bg-main: #020617; /* slate-950 */
            --bg-sidebar: #0f172a; /* slate-900 */
            --accent: #4f46e5; /* indigo-600 */
        }
        
        body { background-color: var(--bg-main); color: #f1f5f9; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Markdown Styling (Mirip ChatGPT) */
        .markdown-body p { margin-bottom: 0.75rem; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body strong { font-weight: 600; color: #fff; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #fff; }
        .markdown-body a { color: #818cf8; text-decoration: underline; }
        
        /* Inline Code */
        .markdown-body code:not([class]) {
            background-color: #1e293b; color: #e2e8f0; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.9em;
        }

        /* Code Blocks */
        .markdown-body pre { background: #0f172a; border: 1px solid #334155; border-radius: 0.5rem; padding: 1rem; margin-bottom: 1rem; overflow-x: auto; position: relative; }
        .code-header { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 0.25rem 0.75rem; border-radius: 0.5rem 0.5rem 0 0; margin: -1rem -1rem 1rem -1rem; font-size: 0.75rem; color: #94a3b8; font-family: monospace; }
        
        /* Animasi */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-enter { animation: fadeIn 0.3s ease-out forwards; }
        
        .typing-indicator span { display: inline-block; width: 4px; height: 4px; background-color: #94a3b8; border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite ease-in-out both; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.5); } }

        /* Transitions untuk Sidebar Mobile */
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-open { transform: translateX(0) !important; }
        .overlay { backdrop-filter: blur(4px); transition: opacity 0.3s; }
    </style>
</head>
<body class="flex h-screen w-full selection:bg-indigo-500/30">

    <!-- ========================================== -->
    <!--                   HTML UI                  -->
    <!-- ========================================== -->

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" class="fixed inset-0 bg-black/60 overlay z-20 hidden opacity-0 lg:hidden" onclick="toggleSidebar()"></div>

    <!-- Sidebar (Riwayat Chat) -->
    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-30 w-72 bg-slate-900 border-r border-slate-800 flex flex-col transform -translate-x-full lg:translate-x-0 h-full">
        <!-- Header Sidebar -->
        <div class="p-4 border-b border-slate-800 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                    <i data-lucide="sparkles" class="w-4 h-4 text-white"></i>
                </div>
                <h2 class="font-bold text-lg text-slate-200">Sya Ai</h2>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-400 hover:text-white rounded-md">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Tombol Chat Baru -->
        <div class="p-3">
            <button onclick="startNewChat()" class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white py-2.5 px-4 rounded-xl font-medium transition-colors shadow-lg shadow-indigo-500/20">
                <i data-lucide="plus" class="w-5 h-5"></i>
                Chat Baru
            </button>
        </div>

        <!-- List Riwayat Chat -->
        <div class="flex-1 overflow-y-auto p-3 space-y-1" id="chat-history-list">
            <!-- Item Riwayat akan di-render di sini oleh JS -->
        </div>
        
        <!-- Footer Sidebar (Pengaturan/Info) -->
        <div class="p-4 border-t border-slate-800 text-xs text-slate-500 flex justify-between items-center">
            <span>v1.0 • Lokal Storage</span>
            <button onclick="clearAllData()" class="hover:text-red-400 transition-colors" title="Hapus Semua Data">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
        </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="flex-1 flex flex-col h-full w-full relative min-w-0 bg-slate-950">
        
        <!-- Navbar Atas -->
        <header class="h-16 shrink-0 flex items-center justify-between px-4 border-b border-slate-800 bg-slate-950/80 backdrop-blur-md z-10">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 -ml-2 text-slate-400 hover:text-white rounded-md">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                
                <!-- Pilihan Model AI -->
                <div class="relative group">
                    <select id="model-selector" class="appearance-none bg-slate-800/50 hover:bg-slate-800 border border-slate-700 text-slate-200 text-sm rounded-lg pl-3 pr-8 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer font-medium transition-colors">
                        <option value="cutad-agent">Loading Models...</option>
                    </select>
                    <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 absolute right-2.5 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <span id="api-status" class="flex h-2 w-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></span>
            </div>
        </header>

        <!-- Container Pesan -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 sm:p-6 scroll-smooth">
            <div id="messages-wrapper" class="max-w-3xl mx-auto space-y-6 flex flex-col pb-4">
                <!-- Welcome Screen (Hanya muncul jika chat kosong) -->
                <div id="welcome-screen" class="h-[60vh] flex flex-col items-center justify-center text-center px-4">
                    <div class="w-16 h-16 rounded-2xl bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center mb-6">
                        <i data-lucide="bot" class="w-8 h-8 text-indigo-400"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-200 mb-2">Halo, Saya Sya Ai</h2>
                    <p class="text-slate-400 max-w-md">Asisten AI pintar yang siap membantu kamu menjawab pertanyaan, menulis kode, dan banyak lagi.</p>
                </div>
            </div>
        </div>

        <!-- Input Box -->
        <footer class="shrink-0 p-4 bg-gradient-to-t from-slate-950 via-slate-950 to-transparent">
            <div class="max-w-3xl mx-auto relative">
                <!-- Tombol Stop (Muncul saat streaming) -->
                <div id="stop-btn-container" class="absolute -top-12 left-1/2 -translate-x-1/2 hidden">
                    <button onclick="stopGeneration()" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-200 px-4 py-1.5 rounded-full text-sm font-medium transition-colors shadow-lg">
                        <i data-lucide="square" class="w-3.5 h-3.5 fill-current"></i> Stop Generate
                    </button>
                </div>

                <form id="chat-form" class="relative flex items-end gap-2 bg-slate-800 border border-slate-700 rounded-2xl p-2 shadow-lg focus-within:border-indigo-500/50 focus-within:ring-1 focus-within:ring-indigo-500/50 transition-all">
                    <textarea 
                        id="chat-input" 
                        rows="1"
                        placeholder="Tanya Sya Ai apa saja..." 
                        class="flex-1 bg-transparent text-slate-200 placeholder-slate-400 resize-none max-h-32 focus:outline-none px-3 py-2 text-[0.95rem] leading-relaxed"
                        style="min-height: 44px;"
                    ></textarea>
                    
                    <button type="submit" id="submit-btn" class="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:hover:bg-indigo-600 text-white w-10 h-10 rounded-xl flex items-center justify-center shrink-0 transition-colors mb-0.5 mr-0.5">
                        <i data-lucide="send" id="send-icon" class="w-4 h-4 ml-0.5"></i>
                        <i data-lucide="loader-2" id="loading-icon" class="w-4 h-4 animate-spin hidden"></i>
                    </button>
                </form>
                <div class="text-center mt-2">
                    <p class="text-[10px] text-slate-500 font-medium uppercase tracking-widest">Powered by Cutad API Gateway</p>
                </div>
            </div>
        </footer>
    </main>

    <!-- ========================================== -->
    <!--                 JAVASCRIPT                 -->
    <!-- ========================================== -->
    <script>
        // Inisialisasi Icons
        lucide.createIcons();

        // Konfigurasi API
        const API_KEY = "cutad-a8d0cc0231f84e87858059e0d143b818";
        const BASE_URL = "https://mimo.lokerin.net/v1";

        // DOM Elements
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const submitBtn = document.getElementById('submit-btn');
        const messagesWrapper = document.getElementById('messages-wrapper');
        const chatContainer = document.getElementById('chat-container');
        const modelSelector = document.getElementById('model-selector');
        const historyList = document.getElementById('chat-history-list');
        const welcomeScreen = document.getElementById('welcome-screen');
        const stopBtnContainer = document.getElementById('stop-btn-container');

        // State Aplikasi
        let sessions = JSON.parse(localStorage.getItem('sya_ai_sessions')) || [];
        let currentSessionId = localStorage.getItem('sya_ai_current_id');
        let isLoading = false;
        let abortController = null;

        // Inisialisasi Marked.js untuk Markdown
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true // convert \n to <br>
        });

        // ==========================================
        // FUNGSI INIT & API
        // ==========================================
        
        async function fetchModels() {
            try {
                const res = await fetch(`${BASE_URL}/models`, {
                    headers: { 'Authorization': `Bearer ${API_KEY}` }
                });
                const data = await res.json();
                
                modelSelector.innerHTML = '';
                data.data.forEach(model => {
                    const opt = document.createElement('option');
                    opt.value = model.id;
                    opt.textContent = model.id === 'cutad-agent-pro' ? 'Agent Pro (Smart)' : 'Agent (Fast)';
                    modelSelector.appendChild(opt);
                });
                
                // Set saved model or default
                const savedModel = localStorage.getItem('sya_ai_model');
                if (savedModel && document.querySelector(`option[value="${savedModel}"]`)) {
                    modelSelector.value = savedModel;
                }
            } catch (err) {
                console.error("Gagal load model", err);
                modelSelector.innerHTML = '<option value="cutad-agent">Agent (Default)</option><option value="cutad-agent-pro">Agent Pro</option>';
            }
        }

        function initApp() {
            fetchModels();
            
            // Auto resize textarea
            chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                if(this.value.trim() === '') this.style.height = 'auto';
            });

            // Enter to submit (Shift+Enter for new line)
            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if(!isLoading) chatForm.dispatchEvent(new Event('submit'));
                }
            });

            // Save model preference
            modelSelector.addEventListener('change', (e) => {
                localStorage.setItem('sya_ai_model', e.target.value);
            });

            // Load session
            if (!currentSessionId || !sessions.find(s => s.id === currentSessionId)) {
                if (sessions.length > 0) {
                    currentSessionId = sessions[0].id;
                } else {
                    startNewChat(false); // don't render yet
                }
            }
            renderSidebar();
            renderCurrentChat();
        }

        // ==========================================
        // MANAJEMEN STATE & STORAGE
        // ==========================================
        
        function saveToLocal() {
            localStorage.setItem('sya_ai_sessions', JSON.stringify(sessions));
            localStorage.setItem('sya_ai_current_id', currentSessionId);
            renderSidebar();
        }

        function startNewChat(render = true) {
            const newSession = {
                id: 'session_' + Date.now(),
                title: 'Chat Baru',
                messages: [
                    { role: 'system', content: 'You are Sya Ai, a helpful and friendly AI assistant. Answer in Indonesian unless asked otherwise.' }
                ],
                updatedAt: Date.now()
            };
            sessions.unshift(newSession);
            currentSessionId = newSession.id;
            saveToLocal();
            
            if(window.innerWidth < 1024) toggleSidebar(); // Close sidebar on mobile
            if(render) renderCurrentChat();
        }

        function switchSession(id) {
            if(isLoading) return; // cegah pindah saat generate
            currentSessionId = id;
            saveToLocal();
            renderCurrentChat();
            if(window.innerWidth < 1024) toggleSidebar();
        }

        function deleteSession(e, id) {
            e.stopPropagation();
            if(confirm('Hapus chat ini?')) {
                sessions = sessions.filter(s => s.id !== id);
                if (currentSessionId === id) {
                    currentSessionId = sessions.length > 0 ? sessions[0].id : null;
                    if(!currentSessionId) startNewChat(false);
                }
                saveToLocal();
                renderCurrentChat();
            }
        }

        function clearAllData() {
            if(confirm('Peringatan: Semua riwayat chat akan dihapus secara permanen. Lanjutkan?')) {
                localStorage.removeItem('sya_ai_sessions');
                sessions = [];
                startNewChat();
            }
        }

        function getCurrentSession() {
            return sessions.find(s => s.id === currentSessionId);
        }

        function updateSessionTitle(text) {
            const session = getCurrentSession();
            if (session && session.title === 'Chat Baru' && session.messages.length <= 3) {
                // Ambil 3-4 kata pertama untuk judul
                let title = text.split(' ').slice(0, 4).join(' ');
                if(title.length > 25) title = title.substring(0, 25) + '...';
                session.title = title;
                saveToLocal();
            }
        }

        // ==========================================
        // RENDERING UI
        // ==========================================

        function renderSidebar() {
            historyList.innerHTML = '';
            sessions.forEach(session => {
                const isActive = session.id === currentSessionId;
                const div = document.createElement('div');
                div.className = `flex items-center justify-between p-2 rounded-lg cursor-pointer transition-colors group ${isActive ? 'bg-slate-800 text-white' : 'text-slate-400 hover:bg-slate-800/50 hover:text-slate-200'}`;
                div.onclick = () => switchSession(session.id);
                
                div.innerHTML = `
                    <div class="flex items-center gap-2 overflow-hidden">
                        <i data-lucide="message-square" class="w-4 h-4 shrink-0"></i>
                        <span class="text-sm truncate">${session.title}</span>
                    </div>
                    <button onclick="deleteSession(event, '${session.id}')" class="shrink-0 p-1 rounded hover:bg-slate-700 text-slate-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity">
                        <i data-lucide="trash" class="w-3.5 h-3.5"></i>
                    </button>
                `;
                historyList.appendChild(div);
            });
            lucide.createIcons();
        }

        function renderCurrentChat() {
            const session = getCurrentSession();
            messagesWrapper.innerHTML = '';
            
            // Filter out system message for UI
            const displayMessages = session.messages.filter(m => m.role !== 'system');
            
            if (displayMessages.length === 0) {
                messagesWrapper.appendChild(welcomeScreen);
                welcomeScreen.classList.remove('hidden');
            } else {
                welcomeScreen.classList.add('hidden');
                displayMessages.forEach(msg => appendMessageUI(msg.role, msg.content, false));
                scrollToBottom();
            }
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Parse format markdown custom untuk UI
        function formatMarkdownForUI(text) {
            let html = marked.parse(text);
            
            // Bungkus code block pre dengan div header untuk tombol copy
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            
            const pres = tempDiv.querySelectorAll('pre');
            pres.forEach((pre, index) => {
                const code = pre.querySelector('code');
                const lang = code.className.replace('language-', '') || 'code';
                const codeText = code.innerText.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
                
                const wrapper = document.createElement('div');
                wrapper.className = 'group relative';
                
                const header = document.createElement('div');
                header.className = 'code-header';
                header.innerHTML = `
                    <span>${lang}</span>
                    <button onclick="copyToClipboard(this)" data-code="${codeText}" class="flex items-center gap-1 text-slate-400 hover:text-white transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                        Copy
                    </button>
                `;
                
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(header);
                wrapper.appendChild(pre);
            });
            
            return tempDiv.innerHTML;
        }

        async function copyToClipboard(button) {
            const code = button.getAttribute('data-code');
            const originalHtml = button.innerHTML;
            
            try {
                // Fallback untuk mobile browser jika clipboard API terestriksi
                const textArea = document.createElement("textarea");
                textArea.value = code;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand("copy");
                document.body.removeChild(textArea);
                
                button.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> Copied!';
                setTimeout(() => { button.innerHTML = originalHtml; }, 2000);
            } catch (err) {
                console.error('Failed to copy', err);
            }
        }

        function appendMessageUI(role, content, animate = true) {
            welcomeScreen.classList.add('hidden');
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex gap-4 items-start ${animate ? 'msg-enter' : ''}`;
            
            const isUser = role === 'user';
            
            // Avatar
            let avatarHtml = isUser ? 
                `<div class="w-8 h-8 flex-shrink-0 rounded-full bg-indigo-500/20 flex items-center justify-center border border-indigo-500/30 mt-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-400"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>` :
                `<div class="w-8 h-8 flex-shrink-0 rounded-xl bg-slate-800 flex items-center justify-center border border-slate-700 shadow-sm mt-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-300"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
                </div>`;

            // Content Bubble
            let contentHtml = '';
            if (isUser) {
                // User message (plain text, no markdown)
                contentHtml = `<div class="max-w-[85%] sm:max-w-[80%] px-4 py-3 rounded-2xl rounded-tr-sm bg-indigo-600 text-white shadow-md">
                    <p class="whitespace-pre-wrap leading-relaxed text-[0.95rem]">${content.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</p>
                </div>`;
            } else {
                // AI message (Markdown)
                contentHtml = `<div class="flex-1 min-w-0 pr-4">
                    <div class="markdown-body text-slate-200 text-[0.95rem] leading-relaxed">
                        ${content === '' ? '<div class="typing-indicator"><span></span><span></span><span></span></div>' : formatMarkdownForUI(content)}
                    </div>
                </div>`;
            }

            msgDiv.innerHTML = isUser ? `${contentHtml}${avatarHtml}` : `${avatarHtml}${contentHtml}`;
            if(isUser) msgDiv.classList.add('justify-end');

            messagesWrapper.appendChild(msgDiv);
            scrollToBottom();
            return msgDiv;
        }

        // ==========================================
        // LOGIK CHAT & STREAMING API
        // ==========================================

        function setUIState(loading) {
            isLoading = loading;
            chatInput.disabled = loading;
            submitBtn.disabled = loading;
            
            const sendIcon = document.getElementById('send-icon');
            const loadIcon = document.getElementById('loading-icon');
            
            if (loading) {
                sendIcon.classList.add('hidden');
                loadIcon.classList.remove('hidden');
                stopBtnContainer.classList.remove('hidden');
            } else {
                sendIcon.classList.remove('hidden');
                loadIcon.classList.add('hidden');
                stopBtnContainer.classList.add('hidden');
                chatInput.focus();
            }
        }

        function stopGeneration() {
            if(abortController) {
                abortController.abort();
                abortController = null;
            }
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text || isLoading) return;

            // 1. Update Session Data
            const session = getCurrentSession();
            session.messages.push({ role: 'user', content: text });
            updateSessionTitle(text);
            saveToLocal();

            // 2. Update UI User
            appendMessageUI('user', text);
            chatInput.value = '';
            chatInput.style.height = 'auto'; // reset height
            setUIState(true);

            // 3. Siapkan UI Assistant Placeholder
            const botMsgElement = appendMessageUI('assistant', '');
            const markdownContainer = botMsgElement.querySelector('.markdown-body');

            // 4. API Request Setup
            abortController = new AbortController();
            const model = modelSelector.value;
            let fullResponse = "";

            try {
                const response = await fetch(`${BASE_URL}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: session.messages, // Kirim seluruh history chat ini
                        stream: true,
                        temperature: 0.7
                    }),
                    signal: abortController.signal
                });

                if (!response.ok) {
                    if(response.status === 429) throw new Error("Terlalu banyak request (Limit). Tunggu sebentar lalu coba lagi.");
                    throw new Error(`Server Error: ${response.status}`);
                }

                // 5. Streaming Parser
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let isFirstChunk = true;

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                            try {
                                const data = JSON.parse(line.slice(6));
                                const textChunk = data.choices[0]?.delta?.content || '';
                                
                                if (textChunk) {
                                    if(isFirstChunk) {
                                        markdownContainer.innerHTML = ''; // Hapus typing indicator
                                        isFirstChunk = false;
                                    }
                                    fullResponse += textChunk;
                                    // Update UI setiap beberapa ms (Markdown parsing berat jika tiap huruf)
                                    markdownContainer.innerHTML = formatMarkdownForUI(fullResponse) + '<span class="inline-block w-1.5 h-4 ml-1 bg-indigo-400 animate-pulse align-middle"></span>';
                                    scrollToBottom();
                                }
                            } catch (err) {
                                // Skip unparseable chunk
                            }
                        }
                    }
                }

                // 6. Selesai Stream, finalisasi format
                markdownContainer.innerHTML = formatMarkdownForUI(fullResponse);

            } catch (error) {
                if (error.name === 'AbortError') {
                    // Jika di stop user
                    markdownContainer.innerHTML = formatMarkdownForUI(fullResponse) + '<br/><span class="text-xs text-slate-500 italic mt-2 inline-block">-- Dihentikan --</span>';
                } else {
                    console.error(error);
                    markdownContainer.innerHTML = `<span class="text-red-400">Maaf, terjadi kesalahan: ${error.message}</span>`;
                }
            } finally {
                // 7. Simpan response ke history
                if(fullResponse) {
                    session.messages.push({ role: 'assistant', content: fullResponse });
                    session.updatedAt = Date.now();
                    saveToLocal();
                }
                setUIState(false);
            }
        });

        // ==========================================
        // SIDEBAR MOBILE TOGGLE
        // ==========================================
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobile-overlay');

        function toggleSidebar() {
            const isOpen = sidebar.classList.contains('sidebar-open');
            if (isOpen) {
                sidebar.classList.remove('sidebar-open');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            } else {
                sidebar.classList.add('sidebar-open');
                overlay.classList.remove('hidden');
                // trigger reflow
                void overlay.offsetWidth;
                overlay.classList.remove('opacity-0');
            }
        }

        // Jalankan saat load
        window.onload = initApp;

    </script>
</body>
</html>
